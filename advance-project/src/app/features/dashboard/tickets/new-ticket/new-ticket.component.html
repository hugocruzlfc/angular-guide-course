<form (ngSubmit)="onSubmit(titleInput.value, requestInput.value)" #form>
  <app-control label="Title" inputId="title">
    <input name="title" id="title" #titleInput #input />
  </app-control>
  <app-control label="Request" inputId="request">
    <textarea
      name="request"
      id="request"
      rows="3"
      #requestInput
      #input
    ></textarea>
  </app-control>

  <p>
    <app-button label="Submit">
      <svg lucideSendHorizontal></svg>
    </app-button>
  </p>
</form>
