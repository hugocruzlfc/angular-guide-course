<div class="fixed inset-0 bg-black/90" (click)="onCancelAddTask()"></div>

<dialog
  open
  class="fixed inset-0 m-auto w-1/2 h-fit bg-purple-900 rounded-lg border-none shadow-lg overflow-hidden p-4 md:p-8 flex flex-col"
>
  <h2 class="m-0 text-purple-200">Add Task</h2>

  <form class="mt-6" [formGroup]="form" (ngSubmit)="onSubmit()">
    <p class="mb-4">
      <label for="title" class="block font-bold text-xs text-purple-300 mb-2"
        >Title</label
      >
      <input
        type="text"
        id="title"
        formControlName="title"
        class="w-full px-1 py-0.5 rounded border bg-purple-100 font-inherit"
        [class.border-red-400]="getError('title')"
        [class.border-purple-300]="!getError('title')"
      />
      @if (getError("title")) {
        <span class="text-red-400 text-xs mt-1 block">{{
          getError("title")
        }}</span>
      }
    </p>

    <p class="mb-4">
      <label for="summary" class="block font-bold text-xs text-purple-300 mb-2"
        >Summary</label
      >
      <textarea
        id="summary"
        rows="5"
        formControlName="summary"
        class="w-full px-1 py-0.5 rounded border bg-purple-100 font-inherit resize-none"
        [class.border-red-400]="getError('summary')"
        [class.border-purple-300]="!getError('summary')"
      ></textarea>
      @if (getError("summary")) {
        <span class="text-red-400 text-xs mt-1 block">{{
          getError("summary")
        }}</span>
      }
    </p>

    <p class="mb-4">
      <label for="due-date" class="block font-bold text-xs text-purple-300 mb-2"
        >Due Date</label
      >
      <input
        type="date"
        id="due-date"
        formControlName="dueDate"
        class="w-full px-1 py-0.5 rounded border bg-purple-100 font-inherit"
        [class.border-red-400]="getError('dueDate')"
        [class.border-purple-300]="!getError('dueDate')"
      />
      @if (getError("dueDate")) {
        <span class="text-red-400 text-xs mt-1 block">{{
          getError("dueDate")
        }}</span>
      }
    </p>

    <p class="flex justify-end gap-1 mt-6">
      <button
        type="button"
        class="px-5 py-1.5 rounded border-none cursor-pointer font-inherit text-purple-300 hover:text-purple-200 active:text-purple-200 transition-colors"
        (click)="onCancelAddTask()"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="px-5 py-1.5 rounded border-none cursor-pointer font-inherit bg-purple-600 shadow-md text-white transition-all hover:bg-purple-700 active:bg-purple-700 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="form.invalid && form.touched"
      >
        Create
      </button>
    </p>
  </form>
</dialog>
