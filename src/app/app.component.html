<app-header />
<main
  class="w-[90%] max-w-200 mx-auto my-10 grid grid-flow-row gap-8 md:my-16 md:grid-cols-[1fr_3fr] px-4"
>
  <!-- USERS -->
  <ul id="users" class="list-none m-0 p-0 flex gap-2 overflow-auto md:flex-col">
    <li>
      <app-user
        [avatar]="users[0].avatar"
        [name]="users[0].name"
        [userId]="users[0].id"
        (selectUser)="onSelectUser($event)"
      />
    </li>
  </ul>

  <app-task [userName]="selectedUserName" />

  <!-- Fallback -->
  <div
    id="fallback"
    class="font-bold text-[1.15rem] text-center m-0 md:text-[1.5rem] md:text-left"
  >
    No users selected
  </div>
</main>
